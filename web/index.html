<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EO Client Web</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #10141b;
      color: #d7dde8;
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      padding: 12px 16px;
      background: linear-gradient(90deg, #1d2430, #141922);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      letter-spacing: 0.04em;
    }

    #status {
      padding: 10px 16px;
      font-size: 14px;
      color: #9fb0c8;
    }
  </style>
</head>
<body>
  <header>EO Client Web</header>
  <div id="status">Loading WebAssembly client...</div>
  <script src="/config.js"></script>
  <script>
    const fallbackServerAddr = (() => {
      const scheme = window.location.protocol === "https:" ? "wss://" : "ws://";
      return `${scheme}${window.location.hostname}:8078`;
    })();
    window.__EO_SERVER_ADDR__ = window.__EO_SERVER_ADDR__ || fallbackServerAddr;
  </script>
  <script src="/wasm_exec.js"></script>
  <script>
    const status = document.getElementById("status");
    const go = new Go();

    Promise.resolve()
      .then(() => WebAssembly.instantiateStreaming(fetch("/eoclient.wasm"), go.importObject))
      .then((result) => {
        status.remove();
        go.run(result.instance);
      })
      .catch((err) => {
        status.textContent = `Failed to start client: ${err}`;
      });
  </script>
</body>
</html>
